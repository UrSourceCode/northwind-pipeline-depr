name: Northwind CI Pipeline

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag'
        required: true
        default: 'latest'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Exchange GitHub OIDC token for Tencent Cloud CAM credentials
        env:
          TENCENT_ROLE_ARN: ${{ secrets.TENCENT_ROLE_ARN }}
          TENCENT_REGION: ${{ secrets.TENCENT_REGION }}
        run: |
          pip install tencentcloud-sdk-python-sts
          python3 .github/scripts/assume_role.py

      - name: Build and push Docker image to TCR
        run: |
          IMAGE="ccr.ccs.tencentyun.com/northwind-assets/app:${{ github.event.inputs.image_tag }}"
          echo "Building image: ${IMAGE}"
          docker build -t $IMAGE .                     # <-- unquoted variable
          echo "${TENCENT_SECRET_KEY}" | docker login ccr.ccs.tencentyun.com \
            --username="${TENCENT_SECRET_ID}" \
            --password-stdin
          docker push ${IMAGE}
